# Dependabot configuration for automatic dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Flutter/Dart dependencies (pubspec.yaml)
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "dart"
    commit-message:
      prefix: "chore(deps)"
    # Pin Flutter codegen packages past 3.0 — Riverpod 2→3 is a full Notifier API
    # rewrite across ~150 @Riverpod providers; freezed 2→3 is breaking annotation
    # changes. Requires dedicated migration audit doc. See closed PR #504.
    # Unpin via PR once Riverpod 3 + freezed 3 GA + migration sprint scheduled.
    ignore:
      - dependency-name: "flutter_riverpod"
        versions: [">=3.0.0"]
      - dependency-name: "riverpod_annotation"
        versions: [">=3.0.0"]
      - dependency-name: "riverpod_generator"
        versions: [">=3.0.0"]
      - dependency-name: "freezed"
        versions: [">=3.0.0"]
      - dependency-name: "freezed_annotation"
        versions: [">=3.0.0"]

  # Node.js dependencies for Cloud Functions
  - package-ecosystem: "npm"
    directory: "/functions"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "cloud-functions"
    commit-message:
      prefix: "chore(deps)"
    # Group minor and patch updates together
    groups:
      firebase:
        patterns:
          - "firebase*"
          - "@firebase/*"
      development:
        patterns:
          - "@types/*"
          - "typescript"
          - "eslint*"
        update-types:
          - "minor"
          - "patch"
    # Pin major versions of deps with known breaking-change scope.
    # See audit/50 F-50-05a + #486 closure note: firebase-functions v7 changed
    # `secrets: []` array semantics (bare strings rejected) across 14 call sites.
    # TypeScript 6 breaks ts-jest compat. @types/node major tracks
    # engines.node=20 (F-CUT-01, Node 20.20.2) — newer @types/node advertises
    # Node APIs absent in the deployed runtime (type-level footguns that pass
    # tsc but break at runtime; see closed PR #751). Unpin via PR once we
    # schedule the dedicated migration session for each.
    ignore:
      - dependency-name: "firebase-functions"
        update-types: ["version-update:semver-major"]
      - dependency-name: "firebase-admin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
