name: CI - Test & Build

on:
  push:
    branches: [ main, develop, mvp/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 0: Detect changed paths — gates heavy jobs (build-web, build-android,
  # test-functions) away from design/audit/docs-only PRs. Negation `!` under
  # `lib/**` lets `lib/core/design/**` skip heavy even though it lives under
  # lib/. Always-running gates (test, coverage-check, validate-firestore-rules,
  # bundle-size cascade off build-web) are unchanged. New-branch push with no
  # base falls back to "all changed" → heavy=true (safe default). See
  # audit/81-ci-path-filter.md for the truth table.
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # dorny/paths-filter v4 (dependabot bump 65d2d393) reads PR files via the
    # GitHub API and fails "Resource not accessible by integration" without an
    # explicit pull-requests grant (v3 tolerated the default token). Failure
    # here cascades: heavy jobs skip + coverage job gets canceled.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      heavy: ${{ steps.filter.outputs.heavy }}
      functions: ${{ steps.filter.outputs.functions }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        with:
          filters: |
            heavy:
              - 'lib/**'
              - '!lib/core/design/**'
              - 'web/**'
              - 'firestore.rules'
              - 'storage.rules'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'android/**'
              - 'ios/**'
              - 'tool/**'
              - '.github/workflows/**'
            functions:
              - 'functions/**'
              - '.github/workflows/**'

  # Job 1: Run tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format code
        run: dart format .
      
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project
        run: flutter analyze --no-fatal-infos

      - name: F-52-03 reopen-trigger guard (audit/52 SF-037)
        # Audit/52 demoted F-52-03 (ALLOWED_SUBSCRIPTION_PRICE_IDS empty on
        # prod) from P0 → P3 deferred on 2026-05-26. Demotion rests on
        # structural evidence: zero call-graph consumers of
        # SubscriptionRepository + "coming soon" canary dialog. This guard
        # fails if either changes — operator must provision the allowlist
        # on rab-booking-248fc + bookbed-dev and remove this step in the
        # same PR. See docs/audits/stripe-credentials-and-flow-52.md §
        # F-52-03 for reopen triggers.
        run: ./scripts/check-no-stray-stripe-ui.sh

      - name: Run tests
        # Exclude the golden net: its baselines are macOS-rasterised and would
        # red on this Linux runner from Skia/font-hinting differences alone. The
        # goldens are a LOCAL net — run on macOS via `flutter test --tags golden`
        # before a visual change. See test/golden/README.md.
        run: flutter test --coverage --exclude-tags golden

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # Job 2: Build Web (Widget)
  build-web:
    name: Build Web Widget
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.heavy == 'true'
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        # `--no-tree-shake-icons` required by Bb* redesign primitives — see
        # audit/103 §3 (bb_icon.dart resolves IconData at runtime via name
        # lookup; tree-shaker cannot prove which glyphs are needed).
        run: flutter build web --release --no-tree-shake-icons

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: web-build
          path: build/web/
          retention-days: 7

  # Job 3: Build Android (Owner App AAB)
  # NOTE: AAB build MUST use tool/build_aab.sh wrapper
  # Direct `flutter build appbundle` fails due to flutter_native_splash plugin registry bug
  # See audit/16-android-regression-full.md Appendix B
  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.heavy == 'true'
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true
      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Get dependencies
        run: flutter pub get
      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Build AAB (via wrapper — patches flutter_native_splash plugin registry)
        run: ./tool/build_aab.sh --release
      - name: Upload AAB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

  # Job 4: Build iOS (Owner App) - DISABLED
  # iOS builds require Apple Developer certificates in CI
  # Build iOS locally for App Store submission instead
  # build-ios:
  #   name: Build iOS App
  #   runs-on: macos-latest
  #   needs: test
  #   timeout-minutes: 45
  #   steps:
