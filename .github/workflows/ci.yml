  #       uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
  #     - name: Setup Flutter
  #       uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
  #       with:
  #         flutter-version: '3.38.5'
  #         channel: 'stable'
  #         cache: true
  #     - name: Get dependencies
  #       run: flutter pub get
  #     - name: Generate code (build_runner)
  #       run: dart run build_runner build --delete-conflicting-outputs
  #     - name: Build iOS (no codesign)
  #       run: flutter build ios --release --no-codesign
  #     - name: Upload iOS build
  #       uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
  #       with:
  #         name: ios-build
  #         path: build/ios/iphoneos/Runner.app
  #         retention-days: 7

  # Job 5: Cloud Functions Tests
  test-functions:
    name: Test Cloud Functions
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.functions == 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: cd functions && npm ci

      - name: Run npm audit
        run: cd functions && npm audit --audit-level=high
        continue-on-error: true

      - name: Build TypeScript
        run: cd functions && npm run build

      - name: Run tests
        run: cd functions && npm test

  # Job 6: Bundle Size Check
  bundle-size:
    name: Check Bundle Size
    runs-on: ubuntu-latest
    needs: build-web
    timeout-minutes: 10

    steps:
      - name: Download web build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: web-build
          path: build/web

      - name: Check bundle size
        run: |
          echo "📦 Bundle Size Report"
          echo "===================="

          # Main dart file
          MAIN_JS=$(find build/web -name "main.dart.js" -type f 2>/dev/null | head -1)
          if [ -n "$MAIN_JS" ]; then
            SIZE=$(du -h "$MAIN_JS" | cut -f1)
            BYTES=$(stat -c%s "$MAIN_JS" 2>/dev/null || stat -f%z "$MAIN_JS")
            echo "main.dart.js: $SIZE ($BYTES bytes)"

            # Fail if main.dart.js > 8MB (8388608 bytes)
            # Flutter web apps are larger due to Dart runtime
            if [ "$BYTES" -gt 8388608 ]; then
              echo "❌ ERROR: main.dart.js exceeds 8MB limit!"
              exit 1
            elif [ "$BYTES" -gt 6291456 ]; then
              echo "⚠️ Warning: main.dart.js is over 6MB"
            else
              echo "✅ Bundle size OK"
            fi
          fi

          # Total build size
          TOTAL=$(du -sh build/web | cut -f1)
          echo "Total build: $TOTAL"

          # List largest files
          echo ""
          echo "📊 Largest files:"
          find build/web -type f -exec du -h {} + | sort -rh | head -10

  # Job 7: Coverage Threshold
  coverage-check:
    name: Check Code Coverage
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests with coverage
        # Exclude the golden net here too: macOS-rasterised baselines red on the
        # Linux runner. Goldens are a LOCAL net (see test/golden/README.md).
        run: flutter test --coverage --exclude-tags golden

      - name: Check coverage threshold
        run: |
          if [ -f coverage/lcov.info ]; then
            # Calculate line coverage percentage
            LINES_FOUND=$(grep -c "^DA:" coverage/lcov.info || echo "0")
            LINES_HIT=$(grep "^DA:" coverage/lcov.info | grep -v ",0$" | wc -l || echo "0")

            if [ "$LINES_FOUND" -gt 0 ]; then
              COVERAGE=$((LINES_HIT * 100 / LINES_FOUND))
              echo "📊 Code Coverage: $COVERAGE% ($LINES_HIT/$LINES_FOUND lines)"

              # Warning if below 20%, fail if below 10%
              if [ "$COVERAGE" -lt 10 ]; then
                echo "❌ Coverage below 10% threshold!"
                exit 1
              elif [ "$COVERAGE" -lt 20 ]; then
                echo "⚠️ Warning: Coverage below 20%"
              else
                echo "✅ Coverage meets threshold ($COVERAGE%)"
              fi
            else
              echo "⚠️ No coverage data found"
            fi
          else
            echo "⚠️ No lcov.info file generated"
          fi

  # Job 8: Firestore Rules Validation
  validate-firestore-rules:
    name: Validate Firestore Rules
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Validate Firestore Rules syntax
        run: |
          if [ -f firestore.rules ]; then
            echo "✅ firestore.rules found"
            # Check for common issues
            if grep -q "allow read, write: if true" firestore.rules; then
              echo "❌ ERROR: Found 'allow read, write: if true' - this is insecure!"
              exit 1
            fi
            if grep -q "allow read, write: if false" firestore.rules; then
              echo "⚠️ Warning: Found 'allow read, write: if false' - database is locked"
            fi
            echo "📋 Rules file size: $(wc -l < firestore.rules) lines"
          else
            echo "⚠️ No firestore.rules file found"
          fi

      - name: Validate Storage Rules syntax
        run: |
          if [ -f storage.rules ]; then
            echo "✅ storage.rules found"
            echo "📋 Rules file size: $(wc -l < storage.rules) lines"
          else
            echo "⚠️ No storage.rules file found"
          fi

      # Emulator-backed rules behavior suite (functions/test/firestore_rules,
      # 10 suites). Added 2026-06-11 — previously these deny-invariants
      # (SF-068/SF-078/F-98-01 etc.) only ran when invoked manually.
      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Run Firestore rules emulator suite
        run: cd functions && npm run test:rules

  # Job 9: Security Scan (Trivy vulnerability scanner)
  # DISABLED: Requires GitHub Advanced Security license for private repos
