name: Deploy Widget to Production

on:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'pubspec.yaml'
  workflow_dispatch:

jobs:
  deploy-widget:
    name: Deploy Widget to Firebase Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Flutter web widget
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        # `--no-tree-shake-icons` required by Bb* redesign primitives
        # (audit/103 §3): bb_icon.dart resolves IconData by name at runtime.
        run: |
          flutter build web \
            --release \
            --no-tree-shake-icons \
            --target lib/widget_main.dart \
            --dart-define=SENTRY_DSN="${SENTRY_DSN}" \
            -o build/web_widget \
            --source-maps \
            --base-href /

      - name: Copy embed.js to build
        run: cp public/embed.js build/web_widget/

      - name: Copy overlay script to build
        run: cp web/bookbed-overlay.js build/web_widget/

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: rab-booking-248fc
          channelId: live
          target: widget
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: Notify on success
        if: success()
        run: echo "✅ Widget deployed successfully to https://view.bookbed.io"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Widget deployment failed"
