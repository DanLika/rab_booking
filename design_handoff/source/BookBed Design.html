  <style>
    /* Keyframes used by primitives */
    @keyframes bb-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes bb-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      @keyframes bb-spin { to {} }
      @keyframes bb-shimmer { 0%, 100% { background-position: 0 0; } }
    }
    /* Canvas root */
    html, body, #root { height: 100%; margin: 0; }
    body { background: #f0eee9; }
    button { font-family: inherit; }
    /* Classic↔Premium switcher: whichever variant is shown fills the artboard cleanly */
    .bb-variant-frame > .theme-light { height: 100% !important; }
  </style>
</head>
