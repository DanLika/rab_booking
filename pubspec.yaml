name: bookbed
description: "BookBed - Modern booking management platform for vacation rentals."
publish_to: 'none'
version: 1.0.10+20

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  state_notifier: ^1.0.0

  # Backend & Database - Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  cloud_functions: ^6.0.7
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8
  firebase_messaging: ^16.1.2  # Push notifications (hidden until mobile app release)

  # Google Sign-In (native Android/iOS)
  google_sign_in: ^6.3.0

  # Apple Sign-In (native iOS)
  sign_in_with_apple: ^7.0.1

  # HTTP Client
  http: ^1.6.0

  # Reactive Streams
  rxdart: ^0.28.0

  # Navigation
  go_router: ^17.1.0

  # UI & Styling
  google_fonts: ^6.3.3

  # Internationalization
  intl: ^0.20.2

  # Image Handling
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1

  # PDF & Receipt Generation
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5

  # QR Code Generation
  qr_flutter: ^4.1.0

  # Loading States
  shimmer: ^3.0.0

  # Animations & Scroll Effects (2025 UX)
  flutter_animate: ^4.5.2  # Declarative animations - reduces boilerplate by ~70%
  auto_size_text: ^3.0.0

  # URL Launcher
  url_launcher: ^6.3.2

  # JSON Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  package_info_plus: ^8.3.1  # App version info
  flutter_secure_storage: ^9.2.4  # Secure credential storage
  uuid: ^4.5.3
  crypto: ^3.0.7
  connectivity_plus: ^7.0.0
  web: ^1.1.1
  collection: ^1.19.1  # Collection utilities (firstWhereOrNull, etc.)

  # AI Chat (Gemini via Firebase)
  firebase_ai: ^3.9.0
  firebase_app_check: ^0.4.1+5

  # Markdown rendering (for AI chat responses)
  flutter_markdown: ^0.7.7+1

  # Error Tracking (Web - Crashlytics doesn't support web)
  sentry_flutter: ^8.14.2

  # Charts
  graphic: ^2.7.0

  # Syncfusion Calendar (Month/Schedule view for mobile-friendly calendar)
  syncfusion_flutter_calendar: ^28.2.12

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.5.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.4

  # Testing
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.0.1  # Moved from dependencies - test-only package
  # integration_test removed - was causing Android release build issues
  # (Flutter bug: dev_dependencies included in GeneratedPluginRegistrant.java)
  golden_toolkit: ^0.15.0

  # Sentry source maps upload (for better error tracking)
  sentry_dart_plugin: ^3.2.1

  # Icon Generation
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/Apple_App_Icon.png" # Primary for iOS/Web (1024x1024)
  image_path_android: "assets/images/Play_Store_App_Icon.png" # Android legacy icon
  min_sdk_android: 21 # Required for adaptive icons
  adaptive_icon_background: "#FFFFFF" # White background
  adaptive_icon_foreground: "assets/images/adaptive_icon_foreground.png" # Padded for safe zone
  web:
    generate: true
    image_path: "assets/images/Apple_App_Icon.png"
    background_color: "#FFFFFF"
    theme_color: "#304FFE"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/splash_logo.png" # Padded logo for splash
  android_12:
    image: "assets/images/splash_logo.png" # Padded logo for Android 12+
    icon_background_color: "#FFFFFF"
  android: true
  ios: true
  web: false # We use a custom HTML splash for web

flutter:
  uses-material-design: true
  generate: true

  # Assets
  assets:
    - assets/translations/
    # Inter fonts (5 weights - used in body text, titles, buttons)
    - assets/google_fonts/Inter-Light.ttf
    - assets/google_fonts/Inter-Regular.ttf
    - assets/google_fonts/Inter-Medium.ttf
    - assets/google_fonts/Inter-SemiBold.ttf
    - assets/google_fonts/Inter-Bold.ttf
    # PlayfairDisplay fonts (5 weights - used in headings, quotes)
    - assets/google_fonts/PlayfairDisplay-Regular.ttf
    - assets/google_fonts/PlayfairDisplay-SemiBold.ttf
    - assets/google_fonts/PlayfairDisplay-Bold.ttf
    - assets/google_fonts/PlayfairDisplay-ExtraBold.ttf
    - assets/google_fonts/PlayfairDisplay-Italic.ttf
    - assets/images/
    - assets/images/platforms/
    - assets/kb/

  # Custom Fonts
  fonts:
    - family: TablerIcons
      fonts:
        - asset: assets/fonts/TablerIcons.ttf
